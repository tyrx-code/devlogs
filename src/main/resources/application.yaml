spring:
  datasource:
    url: jdbc:h2:mem:devlogs
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

app:
  jwt:
    secret: my-super-secret-key-12345678901234567890
    expiration: 86400000 # 24h in ms

flyway:
  enabled: true